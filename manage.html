<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Posts - inkwell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fafafa;
            color: #171717;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e5e5e5;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .btn {
            padding: 0.5rem 1rem;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            background: white;
            color: #171717;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: #171717;
        }
        .btn-primary {
            background: #171717;
            color: white;
            border-color: #171717;
        }
        .btn-primary:hover {
            background: #404040;
        }
        .search-bar {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .search-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 0.875rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: #171717;
        }
        .clear-filters {
            display: none;
            padding: 0.75rem 1rem;
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            color: #737373;
            transition: all 0.2s;
        }
        .clear-filters:hover {
            background: #e5e5e5;
        }
        .clear-filters.visible {
            display: block;
        }
        .post-list {
            list-style: none;
        }
        .post-item {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        .post-item:hover {
            border-color: #a3a3a3;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.5rem;
        }
        .post-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #171717;
            margin-bottom: 0.25rem;
        }
        .post-date {
            font-size: 0.75rem;
            color: #a3a3a3;
        }
        .post-excerpt {
            color: #737373;
            font-size: 0.875rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }
        .post-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }
        .tag {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            border-radius: 999px;
            font-size: 0.75rem;
            color: #525252;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tag:hover {
            background: #e5e5e5;
            border-color: #a3a3a3;
        }
        .tag.active {
            background: #171717;
            color: white;
            border-color: #171717;
        }
        .post-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }
        .btn-delete {
            color: #dc2626;
            border-color: #fecaca;
        }
        .btn-delete:hover {
            background: #fef2f2;
            border-color: #dc2626;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #a3a3a3;
        }
        .empty-state h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #737373;
        }
        .empty-state p {
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .highlight {
            background-color: #fef08a;
            padding: 0.125rem 0;
            border-radius: 2px;
        }
        .filter-info {
            display: none;
            padding: 0.75rem 1rem;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 0.875rem;
            color: #525252;
            margin-bottom: 1rem;
        }
        .filter-info.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>inkwell</h1>
            <a href="editor.html" class="btn btn-primary">New Post</a>
        </header>

        <div class="search-bar">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="Search posts by title or content..."
            >
            <button class="clear-filters" id="clearFilters">Clear Filters</button>
        </div>

        <div class="filter-info" id="filterInfo"></div>

        <ul class="post-list" id="postList">
            <!-- Posts will be rendered here -->
        </ul>

        <div class="empty-state" id="emptyState" style="display: none;">
            <h2>No posts yet</h2>
            <p>Start writing your first post to see it here.</p>
            <a href="editor.html" class="btn btn-primary">Create Your First Post</a>
        </div>
    </div>

    <script src="manage.js"></script>
</body>
</html>
