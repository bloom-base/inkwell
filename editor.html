<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - inkwell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fafafa;
            color: #171717;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e5e5e5;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .btn {
            padding: 0.5rem 1rem;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            background: white;
            color: #171717;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: #171717;
        }
        .btn-primary {
            background: #171717;
            color: white;
            border-color: #171717;
        }
        .btn-primary:hover {
            background: #404040;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #525252;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 0.875rem;
            font-family: 'Inter', -apple-system, sans-serif;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #171717;
        }
        textarea {
            min-height: 400px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            line-height: 1.6;
            resize: vertical;
        }
        .actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }
        .help-text {
            font-size: 0.75rem;
            color: #a3a3a3;
            margin-top: 0.375rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="pageTitle">New Post</h1>
            <a href="manage.html" class="btn">← Back to Posts</a>
        </header>

        <form id="postForm">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required placeholder="Enter post title">
            </div>

            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" required placeholder="Write your post in markdown...

Example with tags:
---
title: My Post Title
tags: [javascript, web-development]
---

# Your content here

Use **markdown** for formatting."></textarea>
                <p class="help-text">Use markdown for formatting. Add tags in the frontmatter section (optional).</p>
            </div>

            <div class="actions">
                <a href="manage.html" class="btn">Cancel</a>
                <button type="submit" class="btn btn-primary" id="saveBtn">Save Post</button>
            </div>
        </form>
    </div>

    <script src="editor.js"></script>
</body>
</html>
